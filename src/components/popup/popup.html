<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup-container">
      <!-- Header matching modifier box style -->
      <div class="popup-header">
        <img src="" alt="Pixels Roll20" class="popup-icon" />
        <span class="popup-title">Pixels Roll20</span>
      </div>

      <!-- Content area -->
      <div class="popup-content">
        <!-- Connection section -->
        <div class="connection-section">
          <button id="connect" class="primary-button">Connect to Pixel</button>
          <div class="connection-status">
            <div id="text" class="status-text"></div>
          </div>
        </div>

        <!-- Modifier controls -->
        <div class="modifier-section">
          <div class="button-container">
            <button id="showModifier" class="secondary-button">
              Show Modifier Box
            </button>
            <button id="hideModifier" class="secondary-button">
              Hide Modifier Box
            </button>
          </div>
        </div>

        <!-- Profiles -->
        <div class="profiles-section">
          <div class="section-label">Saved Profiles</div>

          <div
            id="activeProfileBanner"
            class="active-profile-banner"
            style="display: none"
          >
            <span class="active-profile-label"
              >Active: <span id="activeProfileName"></span
            ></span>
            <button
              id="updateProfile"
              class="profile-item-btn"
              title="Save current popout into the active profile"
            >
              Update ↻
            </button>
          </div>

          <div class="profile-save-row">
            <input
              id="profileName"
              type="text"
              class="profile-input"
              placeholder="Profile name"
              maxlength="40"
            />
            <button id="saveProfile" class="primary-button profile-save-btn">
              Save
            </button>
          </div>
          <ul id="profileList" class="profile-list"></ul>
          <div id="profileEmpty" class="text-small text-muted">
            No saved profiles yet.
          </div>

          <div class="profile-io-row">
            <button id="exportProfiles" class="secondary-button">
              Export All
            </button>
            <button id="importProfiles" class="secondary-button">Import</button>
            <input
              id="importFile"
              type="file"
              accept="application/json,.json"
              style="display: none"
            />
          </div>
        </div>
      </div>
    </div>
    <!-- <button id="disconnect">Disconnect</button> -->
    <script src="popup.js"></script>
  </body>
</html>
